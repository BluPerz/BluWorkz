<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yes or No</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: url("meow.jpg") no-repeat center center fixed;
      background-size: cover;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
    }

    img {
      width: 280px;
      margin-bottom: 20px;
    }

    t_box {
	position: relative;
      width: 240px;
      height: 60px;
      margin: 0 auto;
    }
    h1 { 
       display: block;
       font-size: 2em;
       margin-top: 0.67em;
       margin-bottom: 0.67em;
       margin-left: 0;
       margin-right: 0;
       font-weight: bold;
       }
    .buttons {
      position: relative;
      width: 240px;
      height: 200px;
      margin: 0 auto;
    }

    button {
      padding: 10px 24px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      position: absolute;
    }

    #yes {
      background: #28a745;
      color: white;
      left: 0;
    }

    #no {
      background: #dc3545;
      color: white;
      right: 0;
      transition: left 0.25s ease, top 0.25s ease;
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="https://media.tenor.com/kVYPN27KtDwAAAAj/bear-love.gif" alt="GIF">

      <div class="t_box">
        <h1>Will you be my Valentine's?</h1>
       
    <div class="buttons">
      <button id="yes" onclick="window.location.href='Fpage.html'">Yes</button>
      <button id="no">No</button>
      
      </div>
    </div>
  </div>

  <script>
    const noBtn = document.getElementById("no");
    const area = document.querySelector(".buttons");

    noBtn.addEventListener("click", () => {
      const maxX = area.offsetWidth - noBtn.offsetWidth;
      const maxY = area.offsetHeight - noBtn.offsetHeight;

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
      noBtn.style.right = "auto";
    });
  </script>

</body>
</html>
